<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">

  <!-- Meta / OG tags - config.js 값으로 script에서 동적 설정 -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="규현 ♥ 민지 결혼합니다">
  <meta property="og:description" content="2026.08.02.11:00 아펠가모공덕 라로브홀">
  <meta property="og:image" content="https://kyunyanyo.github.io/minigyunya/images/og/1.jpg">
  <meta name="description" content="">

  <title>Wedding Invitation</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">

  <!-- Love Story 관련 이미지 선로딩: 스크롤 시 지연 없이 빠르게 현출되도록 설정 -->
  <link rel="preload" as="image" href="images/intro/between-greeting-story.jpg" fetchpriority="high">
  <link rel="preload" as="image" href="images/hero/fixed.jpg" fetchpriority="high">
  <!-- 첫 방문/캐시 없음 상태에서 Love Story 첫 이미지들이 늦게 뜨는 것을 줄이기 위한 낮은 우선순위 선로딩 -->
  <link rel="preload" as="image" href="images/story/1.jpg" fetchpriority="low">
  <link rel="preload" as="image" href="images/story/2.jpg" fetchpriority="low">
  <link rel="preload" as="image" href="images/story/3.jpg" fetchpriority="low">
  <!-- 갤러리는 아래쪽 영역이라 prefetch로 조용히 미리 받아두어 빠른 스크롤 시 지연을 줄임 -->
  <link rel="prefetch" as="image" href="images/gallery/1.jpg">
  <link rel="prefetch" as="image" href="images/gallery/2.jpg">
  <link rel="prefetch" as="image" href="images/gallery/3.jpg">
  <link rel="prefetch" as="image" href="images/gallery/4.jpg">
  <link rel="prefetch" as="image" href="images/gallery/5.jpg">
  <link rel="prefetch" as="image" href="images/gallery/6.jpg">

  <style>
    /* Love Story 아래 고정 이미지 + 인사말/Love Story 사이 기존 이미지 */
    .intro-fixed-image {
      width: var(--intro-fixed-width, 100%);
      max-width: var(--intro-fixed-max-width, 100%);
      margin: var(--intro-fixed-margin, 0 auto);
      padding: var(--intro-fixed-padding, 0 24px);
      transform: translate(var(--intro-fixed-x, 0px), var(--intro-fixed-y, 0px));
      overflow: hidden;
      border-radius: var(--intro-fixed-radius, 0px);
      background: transparent;
      box-sizing: border-box;
    }

    .intro-fixed-image-section {
      display: block;
      padding-top: 0;
      padding-bottom: 32px;
      margin-top: 0;
      overflow: hidden;
      position: relative;
      z-index: 1;
      background: transparent;
    }

    /* Love Story 배경 바로 아래에 hero/fixed 이미지가 붙어서 보이도록 상단 여백 제거 */
    #introFixedImageSection,
    #introFixedImageSection .section__inner,
    #introFixedImageBlock {
      margin-top: 0 !important;
      padding-top: 0 !important;
    }

    .intro-fixed-image-section[hidden],
    .intro-fixed-image[hidden] {
      display: none !important;
    }

    .intro-fixed-image__photo {
      display: block;
      width: 100%;
      height: var(--intro-fixed-height, auto);
      object-fit: var(--intro-fixed-fit, contain);
      object-position: var(--intro-fixed-position, center center);
      border-radius: inherit;
    }


    .between-greeting-story-image-section {
      display: block;
      padding-top: 0;
      padding-bottom: 32px;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    /* 인사말과 Love Story 사이 이미지는 스크롤 애니메이션을 끄고 바로 고정 표시하여
       Love Story 제목 애니메이션과 겹쳐 보이지 않게 처리 */
    #betweenGreetingStoryImageBlock {
      opacity: 1 !important;
      transform: translate(var(--intro-fixed-x, 0px), var(--intro-fixed-y, 0px)) !important;
      transition: none !important;
    }

    .between-greeting-story-image-section[hidden] {
      display: none !important;
    }


    /* Love Story 섹션 배경색 */
    #story.story {
      background-color: #ae222d;
    }

    /* 배경색 변경 후 문구가 잘 보이도록 Love Story 텍스트만 밝게 처리 */
    #story .section__title,
    #story .story__text {
      color: #ffffff;
    }

    /* Love Story 제목 아래 밑줄 제거 */
    #story .section__divider {
      display: none !important;
    }

    /* Love Story 섹션과 아래 hero/fixed 이미지 섹션 사이의 간격 제거 */
    #story {
      margin-bottom: 0 !important;
    }

    #story + #introFixedImageSection {
      margin-top: 0 !important;
      padding-top: 0 !important;
    }

    /* Love Story 아래 images/hero/fixed 이미지는 좌우 여백 없이 전체 폭으로 현출 */
    #introFixedImageSection .section__inner {
      width: 100% !important;
      max-width: none !important;
      margin-left: 0 !important;
      margin-right: 0 !important;
      padding-left: 0 !important;
      padding-right: 0 !important;
    }

    #introFixedImageBlock {
      width: 100% !important;
      max-width: none !important;
      margin-left: 0 !important;
      margin-right: 0 !important;
      padding-left: 0 !important;
      padding-right: 0 !important;
      border-radius: 0 !important;
    }

    #introFixedImage {
      width: 100% !important;
      display: block !important;
    }


    /* 메인 장소 바로 아래 피로연 안내 장식 */
    .hero__reception {
      display: inline-block;
      margin: 12px auto 0;
      padding: 8px 18px 9px;
      font-family: var(--hero-reception-font-family, inherit);
      font-size: var(--hero-reception-font-size, 0.86rem);
      font-weight: var(--hero-reception-font-weight, 500);
      line-height: 1.7;
      letter-spacing: var(--hero-reception-letter-spacing, 0.02em);
      color: var(--hero-reception-main-color, currentColor);
      border-top: 1px solid var(--hero-reception-main-color, currentColor);
      border-bottom: 1px solid var(--hero-reception-main-color, currentColor);
      background: rgba(255, 255, 255, 0.38);
      box-sizing: border-box;
    }

    .hero__reception[hidden] {
      display: none !important;
    }

    .hero__reception-title,
    .hero__reception-time,
    .hero__reception-venue {
      display: block;
      font-family: var(--hero-reception-font-family, inherit);
      font-size: var(--hero-reception-font-size, inherit);
      font-weight: var(--hero-reception-font-weight, 500);
      color: var(--hero-reception-main-color, currentColor);
      letter-spacing: var(--hero-reception-letter-spacing, 0.02em);
    }

    /* ✦피로연 안내✦는 위 장소명(♥ 아펠가모 공덕 ♥)과 크기까지 동일하게 고정 */
    .hero__reception-title,
    .hero__reception-deco {
      font-size: var(--hero-reception-title-font-size, var(--hero-reception-font-size, inherit)) !important;
    }

    .hero__reception-deco {
      display: inline-block;
      margin: 0 7px;
      font-family: var(--hero-reception-font-family, inherit);
      font-weight: var(--hero-reception-font-weight, 500);
      color: var(--hero-reception-main-color, currentColor);
      vertical-align: 1px;
    }

    .hero__reception-time,
    .hero__reception-venue {
      white-space: nowrap;
    }


    /* 피로연 오시는 길: 기존 오시는 길과 동일한 포맷으로 사용 */
    .reception-location[hidden] {
      display: none !important;
    }

    .reception-location .location__map-img[hidden],
    .reception-location .location__hall[hidden],
    .reception-location .location__tel[hidden],
    .reception-location .location__address[hidden] {
      display: none !important;
    }
  </style>
  <script src="config.js"></script>
</head>
<body>

    <button class="photo-modal__nav photo-modal__nav--next" id="modalNext" aria-label="다음 사진">&#8250;</button>
    <div class="photo-modal__container" id="modalContainer">

  </div>

  <!-- ─── Main Content ─── -->

    <!-- Hero Section -->

      <div class="hero__photo-wrap">

          <div class="countdown__item">
            <span class="countdown__number" id="countHours">0</span>
            <span class="countdown__unit">시간</span>
          </div>
          <div class="countdown__sep">:</div>
          <div class="countdown__item">
            <span class="countdown__number" id="countMinutes">0</span>

          </div>
          <div class="countdown__sep">:</div>
          <div class="countdown__item">

        <h2 class="section__title animate-item" data-animate="fade-up" id="greetingTitle"></h2>
        <div class="section__divider animate-item" data-animate="fade-in"></div>

        <div class="greeting__parents animate-item" data-animate="fade-up" id="greetingParents"></div>

        </div>

    <!-- Story Section -->

        <p class="story__text animate-item" data-animate="fade-up" id="storyContent"></p>
        <div class="story__photos" id="storyPhotos"></div>
      </div>

    <section class="section intro-fixed-image-section" id="introFixedImageSection" hidden>
      <div class="section__inner">
        <div class="intro-fixed-image" id="introFixedImageBlock">
          <img class="intro-fixed-image__photo" id="introFixedImage" src="" alt="웨딩 사진" loading="eager" fetchpriority="high" decoding="async">

  <script>
    // Love Story 관련 이미지를 미리 요청해서 스크롤 시 로딩 딜레이를 줄입니다.
    (function () {
      var preloadTargets = [
        'images/intro/between-greeting-story.jpg',
        'images/intro/between-greeting-story.png',
        'images/intro/between-greeting-story.webp',
        'images/hero/fixed.jpg',
        'images/hero/fixed.png',
        'images/hero/fixed.webp',
        'images/story/1.jpg',
        'images/story/2.jpg',
        'images/story/3.jpg'
      ];

      preloadTargets.forEach(function (src) {
        var image = new Image();
        image.decoding = 'async';
        image.src = src;
      });
    })();
  </script>

  <script src="script.js"></script>


  <script>
    // CONFIG.reception 값으로 메인 장소 바로 아래 피로연 안내를 표시합니다.
    (function () {
      function escapeHtml(value) {
        return String(value || '').replace(/[&<>"]/g, function (char) {
          return {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;'
          }[char];
        });
      }

      function initHeroReception() {
        if (typeof CONFIG === 'undefined') return;

        var reception = CONFIG.reception || {};
        var el = document.getElementById('heroReception');
        if (!el) return;

        if (reception.enabled === false) {
          el.setAttribute('hidden', 'hidden');
          el.innerHTML = '';
          return;
        }

        var decoration = reception.decoration || '✦';
        var label = reception.label || '피로연 안내';
        var dateText = reception.dateText || '';
        var timeText = reception.timeText || '';
        var venue = reception.venue || '';
        var dateTimeText = [dateText, timeText].filter(Boolean).join(' ');

        if (!dateTimeText && !venue) {
          el.setAttribute('hidden', 'hidden');
          el.innerHTML = '';
          return;
        }

        var venueEl = document.getElementById('heroVenue');
        if (venueEl && window.getComputedStyle) {
          var venueStyle = window.getComputedStyle(venueEl);
          el.style.setProperty('--hero-reception-main-color', venueStyle.color);
          el.style.setProperty('--hero-reception-font-family', venueStyle.fontFamily);
          el.style.setProperty('--hero-reception-font-size', venueStyle.fontSize);
          el.style.setProperty('--hero-reception-title-font-size', venueStyle.fontSize);
          el.style.setProperty('--hero-reception-font-weight', venueStyle.fontWeight);
          el.style.setProperty('--hero-reception-letter-spacing', venueStyle.letterSpacing);
        }

        el.innerHTML =
          '<span class="hero__reception-title">' +
            '<span class="hero__reception-deco">' + escapeHtml(decoration) + '</span>' +
            escapeHtml(label) +
            '<span class="hero__reception-deco">' + escapeHtml(decoration) + '</span>' +
          '</span>' +
          (dateTimeText ? '<span class="hero__reception-time">' + escapeHtml(dateTimeText) + '</span>' : '') +
          (venue ? '<span class="hero__reception-venue">' + escapeHtml(venue) + '</span>' : '');
        el.removeAttribute('hidden');
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initHeroReception);
      } else {
        initHeroReception();
      }
      window.addEventListener('load', initHeroReception);
    })();
  </script>


  <script>
    // CONFIG.receptionLocation 값으로 "피로연 오시는 길" 섹션을 표시합니다.
    (function () {
      function escapeHtml(value) {
        return String(value || '').replace(/[&<>"]/g, function (char) {
          return {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;'
          }[char];
        });
      }

      function showToast(message) {
        var toast = document.getElementById('toast');
        if (!toast) {
          alert(message);
          return;
        }

        toast.textContent = message;
        toast.classList.add('toast--show');
        window.clearTimeout(showToast.timer);
        showToast.timer = window.setTimeout(function () {
          toast.classList.remove('toast--show');
        }, 1800);
      }

      function setText(id, value, hideWhenEmpty) {
        var el = document.getElementById(id);
        if (!el) return;

        if (!value && hideWhenEmpty) {
          el.setAttribute('hidden', 'hidden');
          el.textContent = '';
          return;
        }

        el.removeAttribute('hidden');
        el.textContent = value || '';
      }

      function setLink(id, href) {
        var el = document.getElementById(id);
        if (!el) return;

        if (!href) {
          el.setAttribute('hidden', 'hidden');
          el.removeAttribute('href');
          return;
        }

        el.removeAttribute('hidden');
        el.href = href;
      }

      function copyText(value) {
        if (!value) return;

        if (navigator.clipboard && window.isSecureContext) {
          navigator.clipboard.writeText(value).then(function () {
            showToast('주소가 복사되었습니다');
          }).catch(function () {
            fallbackCopy(value);
          });
          return;
        }

        fallbackCopy(value);
      }

      function fallbackCopy(value) {
        var temp = document.createElement('textarea');
        temp.value = value;
        temp.setAttribute('readonly', 'readonly');
        temp.style.position = 'fixed';
        temp.style.left = '-9999px';
        document.body.appendChild(temp);
        temp.select();

        try {
          document.execCommand('copy');
          showToast('주소가 복사되었습니다');
        } catch (error) {
          showToast('주소 복사에 실패했습니다');
        }

        document.body.removeChild(temp);
      }

      function initReceptionLocation() {
        if (typeof CONFIG === 'undefined') return;

        var data = CONFIG.receptionLocation || {};
        var section = document.getElementById('receptionLocation');
        if (!section) return;

        if (data.enabled === false) {
          section.setAttribute('hidden', 'hidden');
          return;
        }

        var title = data.title || '피로연 오시는 길';
        var venue = data.venue || '';
        var hall = data.hall || '';
        var address = data.address || '';
        var tel = data.tel || '';
        var mapImage = data.mapImage || data.map || '';
        var mapLinks = data.mapLinks || {};

        setText('receptionLocationTitle', title, false);
        setText('receptionLocationVenue', venue, false);
        setText('receptionLocationHall', hall, true);
        setText('receptionLocationAddress', address, true);
        setText('receptionLocationTel', tel ? 'Tel. ' + tel : '', true);

        var mapWrap = document.getElementById('receptionLocationMapWrap');
        var mapImg = document.getElementById('receptionLocationMapImg');
        if (mapImg && mapWrap) {
          if (mapImage) {
            mapImg.src = mapImage;
            mapImg.alt = (venue || '피로연') + ' 약도';
            mapWrap.removeAttribute('hidden');
          } else {
            mapImg.removeAttribute('src');
            mapWrap.setAttribute('hidden', 'hidden');
          }
        }

        setLink('receptionKakaoMapBtn', mapLinks.kakao || '');
        setLink('receptionNaverMapBtn', mapLinks.naver || '');

        var copyBtn = document.getElementById('copyReceptionAddressBtn');
        if (copyBtn) {
          if (address) {
            copyBtn.removeAttribute('hidden');
            copyBtn.onclick = function () {
              copyText(address);
            };
          } else {
            copyBtn.setAttribute('hidden', 'hidden');
          }
        }

        section.removeAttribute('hidden');
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initReceptionLocation);
      } else {
        initReceptionLocation();
      }
      window.addEventListener('load', initReceptionLocation);
    })();
  </script>

  <script>
    // CONFIG.introFixedImage 설정값으로 Love Story 아래에 추가 이미지를 표시합니다.
    (function () {
      function setCssVar(element, name, value) {
        if (value !== undefined && value !== null && value !== '') {
          element.style.setProperty(name, value);
        }
      }

      function initIntroFixedImage() {
        if (typeof CONFIG === 'undefined') return;

        var section = document.getElementById('introFixedImageSection');
        var block = document.getElementById('introFixedImageBlock');
        var img = document.getElementById('introFixedImage');
        var story = document.getElementById('story');

        var fixedImage = CONFIG.introFixedImage || {};
        var imageSrc = fixedImage.src || fixedImage.image || fixedImage.path || '';

        if (!section || !block || !img || fixedImage.enabled !== true) {
          if (section) section.setAttribute('hidden', 'hidden');
          return;
        }

        // 정확한 위치: Love Story 섹션 바로 아래, 갤러리 섹션 바로 위
        if (story && story.parentNode && section.previousElementSibling !== story) {
          story.insertAdjacentElement('afterend', section);
        }

        img.alt = fixedImage.alt || '웨딩 사진';
        img.loading = 'eager';
        img.decoding = 'async';
        img.setAttribute('fetchpriority', 'high');

        setCssVar(block, '--intro-fixed-width', fixedImage.width || '100%');
        setCssVar(block, '--intro-fixed-max-width', fixedImage.maxWidth || '100%');
        setCssVar(block, '--intro-fixed-margin', fixedImage.margin || '0 auto');
        setCssVar(block, '--intro-fixed-padding', fixedImage.padding || '0 24px');
        setCssVar(block, '--intro-fixed-x', fixedImage.x || '0px');
        setCssVar(block, '--intro-fixed-y', fixedImage.y || '0px');
        setCssVar(block, '--intro-fixed-radius', fixedImage.radius || '0px');
        setCssVar(img, '--intro-fixed-height', fixedImage.height || 'auto');
        setCssVar(img, '--intro-fixed-fit', fixedImage.objectFit || 'contain');
        setCssVar(img, '--intro-fixed-position', fixedImage.objectPosition || 'center center');

        // 기존 요청하신 hero/fixed 위치의 이미지도 자동으로 찾아보도록 보강
        var fallbackSrcs = [
          imageSrc,
          'images/hero/fixed.jpg',
          'images/hero/fixed.png',
          'images/hero/fixed.jpeg',
          'images/hero/fixed.webp',
          'images/hero/hero-fixed.jpg',
          'images/hero/hero-fixed.png',
          'images/hero/hero-fixed.webp',
          'images/intro/between-greeting-story.jpg',
          'images/intro/between-greeting-story.png',
          'images/intro/between-greeting-story.webp'
        ].filter(function (src, index, arr) {
          return src && arr.indexOf(src) === index;
        });

        var tryIndex = 0;
        img.onerror = function () {
          tryIndex += 1;
          if (tryIndex < fallbackSrcs.length) {
            img.src = fallbackSrcs[tryIndex];
          }
        };

        if (fallbackSrcs.length > 0) {
          img.src = fallbackSrcs[0];
        }

        section.removeAttribute('hidden');
        section.style.display = 'block';
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initIntroFixedImage);
      } else {
        initIntroFixedImage();
      }
      window.addEventListener('load', initIntroFixedImage);
      window.setTimeout(initIntroFixedImage, 300);
      window.setTimeout(initIntroFixedImage, 1000);
    })();

    // CONFIG.betweenGreetingStoryImage 설정값으로 기존 images/intro/between-greeting-story 이미지를 다시 표시합니다.
    (function () {
      function setCssVar(element, name, value) {
        if (value !== undefined && value !== null && value !== '') {
          element.style.setProperty(name, value);
        }
      }

        if (greeting && greeting.parentNode && section.previousElementSibling !== greeting) {
          greeting.insertAdjacentElement('afterend', section);
        }

        img.alt = fixedImage.alt || '웨딩 사진';
        img.loading = 'eager';
        img.decoding = 'async';
        img.setAttribute('fetchpriority', 'high');

        setCssVar(block, '--intro-fixed-width', fixedImage.width || '100%');
        setCssVar(block, '--intro-fixed-max-width', fixedImage.maxWidth || '100%');
        setCssVar(block, '--intro-fixed-margin', fixedImage.margin || '0 auto');
        setCssVar(block, '--intro-fixed-padding', fixedImage.padding || '0 24px');
        setCssVar(block, '--intro-fixed-x', fixedImage.x || '0px');
        setCssVar(block, '--intro-fixed-y', fixedImage.y || '0px');
        setCssVar(block, '--intro-fixed-radius', fixedImage.radius || '0px');
        setCssVar(img, '--intro-fixed-height', fixedImage.height || 'auto');
        setCssVar(img, '--intro-fixed-fit', fixedImage.objectFit || 'contain');
        setCssVar(img, '--intro-fixed-position', fixedImage.objectPosition || 'center center');

        var fallbackSrcs = [
          imageSrc,
          'images/intro/between-greeting-story.jpg',
          'images/intro/between-greeting-story.png',
          'images/intro/between-greeting-story.jpeg',
          'images/intro/between-greeting-story.webp',
          'images/intro/image-intro-between-greeting-story.jpg',
          'images/intro/image-intro-between-greeting-story.png',
          'images/intro/image-intro-between-greeting-story.webp'
        ].filter(function (src, index, arr) {
          return src && arr.indexOf(src) === index;
        });

        var tryIndex = 0;
        img.onerror = function () {
          tryIndex += 1;
          if (tryIndex < fallbackSrcs.length) {
            img.src = fallbackSrcs[tryIndex];
          }
        };

        if (fallbackSrcs.length > 0) {
          img.src = fallbackSrcs[0];
        }

        section.removeAttribute('hidden');
        section.style.display = 'block';
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initBetweenGreetingStoryImage);
      } else {
        initBetweenGreetingStoryImage();
      }
      window.addEventListener('load', initBetweenGreetingStoryImage);
      window.setTimeout(initBetweenGreetingStoryImage, 300);
      window.setTimeout(initBetweenGreetingStoryImage, 1000);
    })();

  </script>
